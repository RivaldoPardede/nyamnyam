name: Build & Release APK

on:
  push:
    branches:
      - main

# Allow the workflow to create releases and upload assets
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (must match build.gradle.kts JavaVersion.VERSION_17) ───────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── 3. Android SDK: accept licences & install required NDK ─────────────
      - name: Accept Android SDK licences & install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      # ── 4. Flutter stable ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 5. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 6. Quality gate: static analysis ───────────────────────────────────
      - name: Analyze
        run: flutter analyze

      # ── 7. Quality gate: unit & widget tests ───────────────────────────────
      - name: Run tests
        run: flutter test

      # ── 8. Extract version from pubspec.yaml ───────────────────────────────
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r\n')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      # ── 9. Build ───────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 10. Rename APK to include version for clarity ──────────────────────
      - name: Rename APK artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/nyamnyam-v${{ steps.version.outputs.value }}.apk

      # ── 11. Publish GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}-build.${{ github.run_number }}
          name: "NyamNyam v${{ steps.version.outputs.value }} (Build #${{ github.run_number }})"
          body: |
            ## What's in this build

            | Field   | Value |
            |---------|-------|
            | Version | `${{ steps.version.outputs.value }}` |
            | Build   | `#${{ github.run_number }}` |
            | Commit  | `${{ github.sha }}` |
            | Branch  | `${{ github.ref_name }}` |
            | Date    | `${{ github.event.head_commit.timestamp }}` |

            **Commit message:** ${{ github.event.head_commit.message }}

            ---

            > ⚠️ This APK is signed with the debug keystore and is intended for demo and portfolio use only.
          files: build/app/outputs/flutter-apk/nyamnyam-v${{ steps.version.outputs.value }}.apk
          draft: false
          prerelease: false

